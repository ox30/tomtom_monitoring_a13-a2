name: TomTom Traffic Capture (Vector Flow)

# ─────────────────────────────────────────────────────────────────────────────
# PROD — pousse les captures vers le repo privé tomtom-data-prod
# Branche cible : captures-prod (orpheline)
# Prérequis secrets :
#   - TOMTOM_API_KEY      : clé API TomTom
#   - DATA_REPO_TOKEN     : Fine-grained PAT avec Contents:write sur tomtom-data-prod
#   - NTFY_TOPIC_URL      : URL https://ntfy.sh/<topic> prod (optionnel)
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      interval:
        description: "Intervalle entre captures (secondes)"
        required: false
        default: "600"
      cycles:
        description: "Nombre de cycles (0 = boucle jusqu'à 5h45)"
        required: false
        default: "0"
      incidents:
        description: "Afficher les incidents ?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      map_style:
        description: "Style du fond de carte"
        required: false
        default: "night"
        type: choice
        options:
          - "light"
          - "main"
          - "night"
      verbose:
        description: "Logs verbeux (détails par zone, budget API, coords GPS)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: tomtom-capture
  cancel-in-progress: false

env:
  DATA_REPO: ox30/tomtom-data-prod
  DATA_BRANCH: captures-prod

jobs:
  capture-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 370

    steps:
      - name: Checkout code (main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false  # ← critique : empêche l'extraheader qui override notre PAT

      - name: Sauvegarder les fichiers de travail
        run: |
          # Copier ce dont on a besoin hors du repo
          cp capture.py /tmp/capture.py
          cp config.py /tmp/config.py
          cp incidents_export.py /tmp/incidents_export.py 2>/dev/null || true
          cp requirements.txt /tmp/requirements.txt 2>/dev/null || true

      - name: Configurer le remote data (repo privé)
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          if [ -z "$DATA_REPO_TOKEN" ]; then
            echo "❌ DATA_REPO_TOKEN manquant — abandon"
            exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add data "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git"
          echo "✓ Remote 'data' configuré → ${DATA_REPO}"

      - name: Restaurer les données existantes depuis le repo data
        run: |
          # Tenter de récupérer la branche captures-prod (peut ne pas exister la 1ère fois)
          if git fetch data "${DATA_BRANCH}" --depth=1 2>/dev/null; then
            git checkout "data/${DATA_BRANCH}" -- captures/ bases/ 2>/dev/null && \
              echo "✓ Données précédentes restaurées depuis data/${DATA_BRANCH}" || \
              echo "→ Branche ${DATA_BRANCH} existe mais pas de captures/ ni bases/"
          else
            echo "→ Branche ${DATA_BRANCH} inexistante (première exécution)"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Boucle de capture
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          NTFY_TOPIC_URL: ${{ secrets.NTFY_TOPIC_URL }}
          INTERVAL_SEC: ${{ github.event.inputs.interval || '600' }}
          MAX_CYCLES: ${{ github.event.inputs.cycles || '0' }}
          INCIDENTS_ENABLED: ${{ github.event.inputs.incidents || 'true' }}
          BASE_MAP_STYLE: ${{ github.event.inputs.map_style || 'night' }}
          VERBOSE_LOGS: ${{ github.event.inputs.verbose == 'true' && '1' || '0' }}
        run: |
          set -euo pipefail

          MAX_RUNTIME=20700
          INTERVAL=${INTERVAL_SEC}
          START_TIME=$(date +%s)
          CYCLE=0

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ── Préparer la branche captures-work (propre) ──────────
          # Sauvegarder les données existantes
          cp -r captures/ /tmp/captures 2>/dev/null || true
          cp -r bases/ /tmp/bases 2>/dev/null || true

          # Créer une branche orpheline vierge
          git checkout --orphan captures-work
          git rm -rf --cached . -q 2>/dev/null || true

          # Supprimer TOUT du working directory
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Restaurer UNIQUEMENT ce qu'on veut sur la branche captures-prod
          cp /tmp/capture.py capture.py
          cp /tmp/config.py config.py
          cp /tmp/incidents_export.py incidents_export.py 2>/dev/null || true
          cp -r /tmp/captures captures 2>/dev/null || mkdir -p captures
          cp -r /tmp/bases bases 2>/dev/null || mkdir -p bases

          # README pour la branche captures-prod
          cat > README.md << 'EOF'
          # Captures TomTom — Trafic A13/A2 (PROD)

          Branche orpheline de stockage des captures automatiques.
          Repo PRIVÉ — accès restreint aux ayants droit.

          Captures toutes les ~10 minutes (flow vectoriel + incidents).
          Fuseau horaire : **Europe/Zurich** (CET/CEST).

          ## Structure

          ```
          captures/                                    ← composites toutes les 10 min
            YYYY-MM-DD/
              <zone_name>/
                YYYYMMDDhhmm_<zone_name>.jpg
              incidents_YYYY-MM-DD.json                ← liste des incidents du jour
              capture_errors.json                      ← erreurs partielles
          bases/                                       ← cartes de base 1× par run
            YYYY-MM-DD/
              <zone_name>/
                base_YYYYMMDD_<zone_name>.jpg
          ```

          ## Rétention

          Les captures et bases de plus de **7 jours** sont automatiquement supprimées.
          Archivage long terme via Proton Drive (Archive.yml).
          EOF
          sed -i 's/^          //' README.md

          git add README.md
          git add captures/ 2>/dev/null || true
          git add bases/ 2>/dev/null || true
          git commit --allow-empty -m "captures init"

          echo "✓ Branche captures-work prête (contenu : README.md, captures/, bases/)"
          ls -la

          # ── Sauvegarder les cartes de base (1× par run) ──────
          echo ""
          echo "╔════════════════════════════════════════════════════╗"
          echo "║  Sauvegarde des cartes de base (1× par run)       ║"
          echo "╚════════════════════════════════════════════════════╝"
          python capture.py --save-bases || echo "⚠ Erreur sauvegarde bases"

          git add captures/ 2>/dev/null || true
          git add bases/ 2>/dev/null || true
          git commit --amend --allow-empty -m "captures $(TZ=Europe/Zurich date '+%Y-%m-%d %H:%M %Z')" -q
          git push --force data "captures-work:${DATA_BRANCH}" -q || \
            (echo "⚠ Push échoué — retry dans 10s..." && sleep 10 && git push --force data "captures-work:${DATA_BRANCH}" -q) || \
            echo "⚠ Push bases échoué (2 tentatives) — on continue"
          echo "✓ Bases sauvegardées"

          # ── Boucle de capture ──────────────────────────────────
          echo ""
          echo "╔════════════════════════════════════════════════════╗"
          echo "║  Boucle de capture — intervalle : ${INTERVAL}s    ║"
          echo "╚════════════════════════════════════════════════════╝"
          echo ""

          while true; do
            CYCLE_START=$(date +%s)
            CYCLE=$((CYCLE + 1))

            if [ "$MAX_CYCLES" -gt 0 ] && [ "$CYCLE" -gt "$MAX_CYCLES" ]; then
              echo ""
              echo "✓ ${MAX_CYCLES} cycles atteints — fin."
              break
            fi

            ELAPSED=$((CYCLE_START - START_TIME))
            if [ "$ELAPSED" -ge "$MAX_RUNTIME" ]; then
              echo ""
              echo "⏱ Durée max atteinte — fin de la boucle"
              break
            fi

            REMAINING=$(( (MAX_RUNTIME - ELAPSED) / 60 ))
            echo ""
            echo "━━━ Cycle #${CYCLE} — $(TZ=Europe/Zurich date '+%H:%M %Z') — ${REMAINING} min restantes ━━━"

            python capture.py || echo "⚠ Erreur capture (cycle continue)"

            git add captures/ 2>/dev/null || true
            git add bases/ 2>/dev/null || true
            git commit --amend --allow-empty -m "captures $(TZ=Europe/Zurich date '+%Y-%m-%d %H:%M %Z')" -q
            git push --force data "captures-work:${DATA_BRANCH}" -q || \
              (echo "⚠ Push échoué — retry dans 10s..." && sleep 10 && git push --force data "captures-work:${DATA_BRANCH}" -q) || \
              echo "⚠ Push échoué (2 tentatives) — données conservées pour le prochain cycle"

            CYCLE_END=$(date +%s)
            CYCLE_DURATION=$((CYCLE_END - CYCLE_START))
            SLEEP_TIME=$((INTERVAL - CYCLE_DURATION))

            if [ "$SLEEP_TIME" -gt 0 ]; then
              echo "💤 Prochain cycle dans ${SLEEP_TIME}s (capture a pris ${CYCLE_DURATION}s)"
              sleep "$SLEEP_TIME"
            else
              echo "⚠ Cycle a pris ${CYCLE_DURATION}s — enchaîne immédiatement"
            fi
          done

          echo ""
          echo "═══ Boucle terminée après ${CYCLE} cycles ═══"
