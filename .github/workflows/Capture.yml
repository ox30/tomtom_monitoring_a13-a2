name: TomTom Traffic Capture (Vector Flow)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      interval:
        description: "Intervalle entre captures (secondes)"
        required: false
        default: "600"
      cycles:
        description: "Nombre de cycles (0 = boucle jusqu'à 5h45)"
        required: false
        default: "0"

concurrency:
  group: tomtom-capture
  cancel-in-progress: false

jobs:
  capture-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 370

    steps:
      - name: Checkout code (main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restaurer les données existantes
        run: |
          git fetch origin captures --depth=1 2>/dev/null && \
          git checkout origin/captures -- captures/ bases/ 2>/dev/null && \
          echo "✓ Données précédentes restaurées" || \
          echo "→ Première exécution — pas de données précédentes"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Boucle de capture
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          INTERVAL_SEC: ${{ github.event.inputs.interval || '600' }}
          MAX_CYCLES: ${{ github.event.inputs.cycles || '0' }}
        run: |
          set -euo pipefail

          MAX_RUNTIME=20700
          INTERVAL=${INTERVAL_SEC}
          START_TIME=$(date +%s)
          CYCLE=0

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan captures-work
          git rm -rf --cached . -q 2>/dev/null || true

          # Créer les dossiers racine pour éviter les erreurs git add
          mkdir -p captures bases

          # README pour la branche captures
          cat > README.md << 'EOF'
          # Captures TomTom — Trafic A13/A2

          Captures automatiques (flow vectoriel + incidents) toutes les ~10 minutes.
          Fuseau horaire : **Europe/Zurich** (CET/CEST).

          ## Télécharger

          | Quoi | Comment |
          |---|---|
          | **Une capture** | Naviguer dans les dossiers ci-dessous → clic sur l'image → bouton ↓ **Download** |
          | **Tout télécharger (ZIP)** | [📦 Télécharger le ZIP](https://github.com/ox30/tomtom_monitoring_a13-a2/archive/refs/heads/captures.zip) |

          ## Structure

          ```
          captures/                                              ← composites (base + flow + incidents)
            2026-03-29/
              zone_A13_Chur/
                2026-03-29-0830_zone_A13_Chur.jpg                ← heure locale Zurich
                2026-03-29-0840_zone_A13_Chur.jpg
                ...
              zone_Chur_Isla-T/
                ...
              zone_globale_A2_A13/
                ...

          bases/                                                 ← cartes de fond (1× par run)
            2026-03-29/
              zone_A13_Chur/
                2026-03-29-0600_zone_A13_Chur_base.jpg
              ...
          ```

          ## Zones capturées

          | Zone | Couverture |
          |---|---|
          | `zone_globale_A2_A13` | Vue d'ensemble A2–A13 |
          | `zone_A13_Chur` | Secteur A13 autour de Chur |
          | `zone_Chur_Isla-T` | Détail Chur – Isla/Thusis |

          ## Rétention

          Les captures et bases de plus de **7 jours** sont automatiquement supprimées.
          EOF
          sed -i 's/^          //' README.md

          git add -A
          git commit --allow-empty -m "captures init"

          # ── Sauvegarder les cartes de base (1× par run) ──────
          echo ""
          echo "╔════════════════════════════════════════════════════╗"
          echo "║  Sauvegarde des cartes de base (1× par run)       ║"
          echo "╚════════════════════════════════════════════════════╝"
          python capture.py --save-bases || echo "⚠ Erreur sauvegarde bases"

          git add -A
          git commit --amend --allow-empty -m "captures $(TZ=Europe/Zurich date '+%Y-%m-%d %H:%M %Z')" -q
          git push --force origin captures-work:captures -q
          echo "✓ Bases sauvegardées et pushées"

          # ── Boucle de capture ──────────────────────────────────
          echo ""
          echo "╔════════════════════════════════════════════════════╗"
          echo "║  Boucle de capture — intervalle : ${INTERVAL}s    ║"
          echo "╚════════════════════════════════════════════════════╝"
          echo ""

          while true; do
            CYCLE_START=$(date +%s)
            CYCLE=$((CYCLE + 1))

            if [ "$MAX_CYCLES" -gt 0 ] && [ "$CYCLE" -gt "$MAX_CYCLES" ]; then
              echo ""
              echo "✓ ${MAX_CYCLES} cycles atteints — fin."
              break
            fi

            ELAPSED=$((CYCLE_START - START_TIME))
            if [ "$ELAPSED" -ge "$MAX_RUNTIME" ]; then
              echo ""
              echo "⏱ Durée max atteinte — fin de la boucle"
              break
            fi

            REMAINING=$(( (MAX_RUNTIME - ELAPSED) / 60 ))
            echo ""
            echo "━━━ Cycle #${CYCLE} — $(TZ=Europe/Zurich date '+%H:%M %Z') — ${REMAINING} min restantes ━━━"

            python capture.py || echo "⚠ Erreur capture (cycle continue)"

            git add -A
            git commit --amend --allow-empty -m "captures $(TZ=Europe/Zurich date '+%Y-%m-%d %H:%M %Z')" -q
            git push --force origin captures-work:captures -q
            echo "✓ Push OK"

            CYCLE_END=$(date +%s)
            CYCLE_DURATION=$((CYCLE_END - CYCLE_START))
            SLEEP_TIME=$((INTERVAL - CYCLE_DURATION))

            if [ "$SLEEP_TIME" -gt 0 ]; then
              echo "💤 Prochain cycle dans ${SLEEP_TIME}s (capture a pris ${CYCLE_DURATION}s)"
              sleep "$SLEEP_TIME"
            else
              echo "⚠ Cycle a pris ${CYCLE_DURATION}s — enchaîne immédiatement"
            fi
          done

          echo ""
          echo "═══ Boucle terminée après ${CYCLE} cycles ═══"
