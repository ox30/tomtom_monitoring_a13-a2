name: TomTom Traffic Capture (Vector Flow)

on:
  workflow_dispatch:
  schedule:
    # Toutes les 6h — le workflow tourne ~6h avec des cycles de 10 min
    - cron: '0 0,6,12,18 * * *'

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 370  # 6h + marge

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Vérifier les fichiers requis
        run: |
          if [ ! -f capture.py ]; then
            echo "✗ capture.py introuvable dans le repo !"
            echo "  Assurez-vous que capture.py est pushé sur la branche main."
            exit 1
          fi

      - name: Checkout branche captures
        run: |
          git fetch origin captures || true
          if git rev-parse --verify origin/captures >/dev/null 2>&1; then
            git checkout captures
            git merge main --no-edit --strategy-option theirs || true
          else
            git checkout -b captures
          fi

      - name: Boucle de capture (10 min × 36 cycles = 6h)
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: |
          CYCLES=36
          echo "═══ Démarrage: ${CYCLES} cycles de 10 min ═══"

          for CYCLE in $(seq 1 $CYCLES); do
            echo ""
            echo "──── Cycle ${CYCLE}/${CYCLES} — $(date -u '+%H:%M UTC') ────"
            
            python capture.py || echo "⚠ Erreur cycle ${CYCLE}"

            # Commit et push
            git add -A captures/ .base-cache/
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "📸 ${TIMESTAMP}" --allow-empty || true
            git push origin captures || true

            # Attendre 10 min (sauf dernier cycle)
            if [ "$CYCLE" -lt "$CYCLES" ]; then
              echo "⏳ Prochain cycle dans 10 min..."
              sleep 600
            fi
          done

          echo ""
          echo "═══ Boucle terminée après ${CYCLES} cycles ═══"
