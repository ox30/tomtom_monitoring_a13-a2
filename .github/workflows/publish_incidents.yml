name: Publish Incidents (incidents-data branch)

# ─────────────────────────────────────────────────────────────────────────────
# Publie le fichier incidents_<J-1>.json depuis le repo PRIVÉ tomtom-data-prod
# branche `captures-prod` vers la branche orpheline `incidents-data` du MÊME
# repo privé. Maintient à jour `index.json` listant tous les jours disponibles
# (utilisé par monitoring-stats v15 via proxy authentifié).
#
# Pattern multi-cron (4 déclenchements/jour) :
#  - Si le JSON J-1 est déjà publié avec taille identique → skip publish
#    mais on régénère quand même `index.json` (cas migration ou refresh)
#  - ntfy uniquement sur succès réel (push effectif) ou échec
#
# Prérequis secrets :
# - DATA_REPO_TOKEN       : Fine-grained PAT Contents:write sur tomtom-data-prod
# - NTFY_TOPIC_URL_STATS  : URL https://ntfy.sh/<topic> dédié stats (optionnel)
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '30 1,6,10,14 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date à publier (AAAA-MM-DD, vide = J-1)'
        required: false
        default: ''
      regenerate_index_only:
        description: 'Régénérer uniquement index.json (sans publier de nouveau JSON)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-incidents
  cancel-in-progress: false

env:
  DATA_REPO: ox30/tomtom-data-prod
  SOURCE_BRANCH: captures-prod
  TARGET_BRANCH: incidents-data

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # ─── 1. Date cible ────────────────────────────────────────────────────
      - name: Date cible
        run: |
          if [ "${{ github.event.inputs.regenerate_index_only }}" = "true" ]; then
            echo "📋 Mode régénération index uniquement"
            echo "REGEN_ONLY=true" >> $GITHUB_ENV
          else
            if [ -n "${{ github.event.inputs.date }}" ]; then
              DATE="${{ github.event.inputs.date }}"
            else
              DATE=$(date -u -d "yesterday" +%Y-%m-%d)
            fi
            echo "DATE=${DATE}" >> $GITHUB_ENV
            echo "📅 Date cible : ${DATE}"
          fi

      # ─── 2. Récupérer le JSON source depuis tomtom-data-prod/captures-prod ─
      - name: Récupérer incidents_<DATE>.json depuis le repo data privé
        if: env.REGEN_ONLY != 'true'
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          URL="https://raw.githubusercontent.com/${DATA_REPO}/${SOURCE_BRANCH}/captures/${DATE}/incidents_${DATE}.json"
          HTTP_CODE=$(curl -sL -o /tmp/incidents.json \
            -H "Authorization: token ${DATA_REPO_TOKEN}" \
            -w "%{http_code}" "$URL" || echo "000")

          if [ "$HTTP_CODE" != "200" ] || [ ! -s /tmp/incidents.json ]; then
            echo "⚠ Fichier source absent ou inaccessible (HTTP $HTTP_CODE)"
            echo "   URL : $URL"
            echo "SOURCE_MISSING=true" >> $GITHUB_ENV
            exit 0
          fi

          LOCAL_SIZE=$(stat --format=%s /tmp/incidents.json)
          echo "LOCAL_SIZE=${LOCAL_SIZE}" >> $GITHUB_ENV
          echo "✓ Fichier récupéré (${LOCAL_SIZE} bytes)"

      # ─── 3. Vérifier l'état de la branche cible ───────────────────────────
      - name: Vérifier état branche incidents-data
        if: env.REGEN_ONLY != 'true' && env.SOURCE_MISSING != 'true'
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          BRANCH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${DATA_REPO_TOKEN}" \
            "https://api.github.com/repos/${DATA_REPO}/branches/${TARGET_BRANCH}")

          if [ "$BRANCH_STATUS" = "200" ]; then
            EXISTING=$(curl -s -H "Authorization: token ${DATA_REPO_TOKEN}" \
              "https://api.github.com/repos/${DATA_REPO}/contents/incidents_${DATE}.json?ref=${TARGET_BRANCH}")
            REMOTE_SIZE=$(echo "$EXISTING" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print(d.get('size', 0) if isinstance(d, dict) and 'size' in d else 0)
          except Exception:
              print(0)
          ")
            echo "REMOTE_SIZE=${REMOTE_SIZE}" >> $GITHUB_ENV
            echo "✓ Branche existante — fichier remote = ${REMOTE_SIZE} bytes"
          else
            echo "REMOTE_SIZE=0" >> $GITHUB_ENV
            echo "ℹ Branche ${TARGET_BRANCH} inexistante — sera créée"
          fi

      # ─── 4. Marquer si publish nécessaire ─────────────────────────────────
      - name: Détection besoin de publier
        if: env.REGEN_ONLY != 'true' && env.SOURCE_MISSING != 'true'
        run: |
          if [ "$LOCAL_SIZE" = "$REMOTE_SIZE" ]; then
            echo "✓ Fichier déjà publié — pas de publish, mais on regénère l'index"
            echo "NEEDS_PUBLISH=false" >> $GITHUB_ENV
          else
            echo "→ Publish requis"
            echo "NEEDS_PUBLISH=true" >> $GITHUB_ENV
          fi

      # ─── 5. Cloner le repo data ───────────────────────────────────────────
      - name: Cloner tomtom-data-prod
        if: env.SOURCE_MISSING != 'true'
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          git clone --depth 1 \
            "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git" \
            /tmp/ms 2>&1 | sed "s/${DATA_REPO_TOKEN}/***/g"
          cd /tmp/ms
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads origin "${TARGET_BRANCH}" | grep -q "${TARGET_BRANCH}"; then
            echo "✓ Branche ${TARGET_BRANCH} existe — checkout"
            git fetch origin "${TARGET_BRANCH}:${TARGET_BRANCH}"
            git checkout "${TARGET_BRANCH}"
          else
            echo "🌱 Création de la branche orpheline ${TARGET_BRANCH}"
            git checkout --orphan "${TARGET_BRANCH}"
            git rm -rf . 2>/dev/null || true
            cat > README.md << 'README_EOF'
          # incidents-data

          Branche orpheline contenant les fichiers `incidents_AAAA-MM-DD.json`
          produits par la capture du système `tomtom_monitoring_a13-a2`.

          Voir `index.json` pour la liste complète des jours disponibles
          (mis à jour automatiquement à chaque publish).

          Ne pas commiter manuellement sur cette branche.
          README_EOF
            git add README.md
            git commit -m "🌱 Initial commit — incidents-data orphan branch"
          fi

      # ─── 6. Copier le nouveau JSON si nécessaire ──────────────────────────
      - name: Copier le nouveau JSON
        if: env.SOURCE_MISSING != 'true' && env.NEEDS_PUBLISH == 'true'
        run: |
          cp /tmp/incidents.json /tmp/ms/incidents_${DATE}.json
          echo "✓ Nouveau JSON copié : incidents_${DATE}.json ($LOCAL_SIZE bytes)"

      # ─── 7. Si REGEN_ONLY, cloner la branche maintenant ───────────────────
      - name: Cloner pour REGEN_ONLY
        if: env.REGEN_ONLY == 'true'
        env:
          DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          git clone --depth 1 --branch "${TARGET_BRANCH}" \
            "https://x-access-token:${DATA_REPO_TOKEN}@github.com/${DATA_REPO}.git" \
            /tmp/ms 2>&1 | sed "s/${DATA_REPO_TOKEN}/***/g"
          cd /tmp/ms
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ─── 8. Régénérer index.json à partir du contenu actuel ───────────────
      - name: Régénérer index.json
        if: env.SOURCE_MISSING != 'true' || env.REGEN_ONLY == 'true'
        run: |
          cd /tmp/ms
          python3 - << 'PYEOF'
          import json, os, glob
          from datetime import datetime, timezone

          files = []
          for f in sorted(glob.glob('incidents_*.json')):
              name = os.path.basename(f)
              date = name.replace('incidents_', '').replace('.json', '')
              size = os.path.getsize(f)
              files.append({'date': date, 'filename': name, 'size': size})

          files.sort(key=lambda x: x['date'], reverse=True)  # plus récent d'abord

          manifest = {
              'generated_at': datetime.now(timezone.utc).isoformat(timespec='seconds'),
              'branch': 'incidents-data',
              'count': len(files),
              'total_size_bytes': sum(f['size'] for f in files),
              'days': files,
          }

          with open('index.json', 'w') as f:
              json.dump(manifest, f, indent=2)

          total_mb = manifest['total_size_bytes'] / 1024 / 1024
          print(f"✓ Manifest généré : {len(files)} jours, total {total_mb:.1f} MB")
          PYEOF

      # ─── 9. Commit + push si diff ─────────────────────────────────────────
      - name: Commit & push
        if: env.SOURCE_MISSING != 'true' || env.REGEN_ONLY == 'true'
        run: |
          cd /tmp/ms
          git add -A

          if git diff --cached --quiet; then
            echo "✓ Aucun changement à committer"
            echo "PUSHED=false" >> $GITHUB_ENV
            exit 0
          fi

          if [ "$REGEN_ONLY" = "true" ]; then
            MSG="🔄 Refresh index.json (manual regen)"
          elif [ "$NEEDS_PUBLISH" = "true" ]; then
            MSG="📊 Publish incidents_${DATE}.json (${LOCAL_SIZE} bytes) + update index"
          else
            MSG="🔄 Refresh index.json"
          fi

          git commit -m "$MSG"

          for i in 1 2; do
            if git push origin "${TARGET_BRANCH}"; then
              echo "✓ Push réussi (tentative $i/2)"
              echo "PUSHED=true" >> $GITHUB_ENV
              break
            else
              echo "⚠ Push échoué (tentative $i/2) — pull rebase + retry"
              git pull --rebase origin "${TARGET_BRANCH}" 2>/dev/null || true
              sleep 10
            fi
          done

      # ─── 10. Nettoyage ────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: rm -rf /tmp/ms /tmp/incidents.json

      # ─── 11. Notification ntfy (succès — push effectif uniquement) ────────
      - name: Notif ntfy (succès)
        if: env.PUSHED == 'true'
        env:
          NTFY: ${{ secrets.NTFY_TOPIC_URL_STATS }}
        run: |
          if [ -z "$NTFY" ]; then exit 0; fi
          if [ "$REGEN_ONLY" = "true" ]; then
            TITLE="Index refresh OK"
            BODY="Mode : régénération manuelle du manifest
            Trigger : ${{ github.event_name }}"
            TAGS="arrows_counterclockwise,white_check_mark"
          elif [ "$NEEDS_PUBLISH" = "true" ]; then
            TITLE="Publish incidents OK"
            BODY="Date : ${DATE}
            Taille : ${LOCAL_SIZE} bytes
            Index : mis à jour
            Trigger : ${{ github.event_name }}"
            TAGS="white_check_mark,outbox_tray"
          else
            TITLE="Index refresh OK"
            BODY="JSON déjà publié pour ${DATE}, index.json refresh
            Trigger : ${{ github.event_name }}"
            TAGS="arrows_counterclockwise"
          fi
          curl -s \
            -H "Title: $TITLE" \
            -H "Priority: 2" \
            -H "Tags: $TAGS" \
            -d "$BODY" \
            "$NTFY" || true

      # ─── 12. Notification ntfy (échec) ────────────────────────────────────
      - name: Notif ntfy (échec)
        if: failure()
        env:
          NTFY: ${{ secrets.NTFY_TOPIC_URL_STATS }}
        run: |
          if [ -z "$NTFY" ]; then exit 0; fi
          BODY="Date : ${DATE:-inconnue}
          Trigger : ${{ github.event_name }}
          Run : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s \
            -H "Title: Publish incidents ECHEC" \
            -H "Priority: 4" \
            -H "Tags: rotating_light" \
            -d "$BODY" \
            "$NTFY" || true
